include:
  - ../../compose-include.yaml

services:    
  docling:
    container_name: ${DOCLING_NAME?name not set!}

    runtime: amd
    build:
      context: .
      dockerfile_inline: |
        FROM rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.9.1
        RUN pip install --upgrade pip
        RUN pip install docling-serve[ui]
        RUN pip install easyocr
    entrypoint: ["docling-serve"]
    command: ["run"]
    environment:
      - AMD_VISIBLE_DEVICES=all
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - DOCLING_NUM_THREADS=16
      - DOCLING_DEBUG_PROFILE_PIPELINE_TIMINGS=True
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=4
      - DOCLING_SERVE_ENG_LOC_SHARE_MODELS=True
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=${DOCLING_PORT}
      - UVICORN_WORKERS=4
      - DOCLING_SERVE_ENABLE_UI=1

    shm_size: 8g
    volumes:
      - /data/volumes-data/models/huggingface:/root/.cache/huggingface
      - /tmp:/tmp

    tty: true
    restart: unless-stopped

    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - ${SHARED_NETWORK?network}
    # ports:
    #   - "${DOCLING_HOSTPORT?port issue.}:${DOCLING_PORT:-5001}"

volumes:
  docling:

