services:    
  docling:
    container_name: docling

    runtime: amd
    build:
      context: .
      dockerfile_inline: |
        FROM rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.9.1
        RUN pip install --upgrade pip
        RUN pip install docling
        RUN pip install docling[asr,vlm,tesserocr,easyocr,tesserocr,rapidocr]
        # RUN docling-tools models download
        RUN docling https://www.baidu.com/

    environment:
      - AMD_VISIBLE_DEVICES=all
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1

    shm_size: 8g
    volumes:
      - /data/volumes-data/models/huggingface:/root/.cache/huggingface
      - /tmp:/tmp

    tty: true
    restart: unless-stopped

    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - share-net

volumes:
  docling:

networks:
  share-net:
    external: true
