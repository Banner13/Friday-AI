include:
  - ../../compose-include.yaml

services:
  open-webui:
    container_name: ${OWUI_NAME?openwebui name not set!}
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OLLAMA_BASE_URL=http://${OLLAMA_NAME}:${OLLAMA_PORT}
      # - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - WEB_SEARCH_TRUST_ENV=True
      - DEFAULT_PINNED_MODELS=gpt-oss:20b
      - ENABLE_BASE_MODELS_CACHE=True
      - MODELS_CACHE_TTL=600
      - PORT=${OWUI_PORT}
    volumes:
      - ${APP_DATA?volumes issue.}/open-webui:/app/backend/data
    networks:
      - ${SHARED_NETWORK?net issue.}
    ports:
      - "${OWUI_HOSTPORT?port issue.}:${OWUI_PORT:-8080}"

volumes:
  open-webui:
