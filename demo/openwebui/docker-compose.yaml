services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
    volumes:
      - /data/volumes-data/open-webui:/app/backend/data
    networks:
      - share-net
    ports:
      - "8080:8080"

volumes:
  open-webui:

networks:
  share-net:
    name: share-net
    external: true

